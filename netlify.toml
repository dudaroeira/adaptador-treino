[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# O app chama /api/adapt; redireciona para a function que adiciona a chave
[[redirects]]
  from = "/api/adapt"
  to = "/.netlify/functions/adapt"
  status = 200
  force = true

# Service worker controla todo o site e atualiza sempre
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"
